    <script>
      // Captura cedo o evento de instalação (Android/Chrome) — antes do React montar.
      window.addEventListener("beforeinstallprompt", function (e) {
        e.preventDefault();
        window.__bip = e;
        try { window.dispatchEvent(new Event("bip-ready")); } catch (_) {}
      });
      window.addEventListener("appinstalled", function () { window.__bip = null; });
    </script>
