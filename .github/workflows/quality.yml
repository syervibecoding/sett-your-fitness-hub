name: Quality gates

on:
  push:
    branches: [main, codex/claude-compat]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run verify:backend
      - run: npm run test
      - run: npm run build
      - name: Verify production bundle backend
        run: |
          ! grep -R -F "cxesecxyrndveookvlzz" dist
          grep -R -q -F "zshrcgbyhzxpnlccssyz" dist
